<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #root, #app { width: 100%; height: 100%; position: absolute; inset: 0; }
        #root:empty, #app:empty { display: none; }
        .banana-error-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(13, 17, 23, 0.95); color: #f0f0f0;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            padding: 32px; overflow: auto;
        }
        .banana-error-overlay h2 {
            color: #ff6b6b; font-size: 16px; margin-bottom: 12px;
        }
        .banana-error-overlay pre {
            background: rgba(255,255,255,0.05); padding: 16px;
            border-radius: 8px; overflow-x: auto; line-height: 1.5;
            border: 1px solid rgba(255,107,107,0.2);
        }
        .banana-error-overlay button {
            margin-top: 16px; padding: 8px 20px;
            background: #FFD60A; color: #0D1117; border: none;
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="app"></div>
    <script>
        // CORS proxy - route cross-origin requests through the preview server
        (function() {
            var PROXY_PREFIX = '/_proxy/';
            var localOrigin = window.location.origin;

            // Wrap fetch
            var originalFetch = window.fetch;
            window.fetch = function(input, init) {
                var url = typeof input === 'string' ? input : (input instanceof Request ? input.url : String(input));

                // Only proxy cross-origin http/https requests (not local, not data:, not blob:)
                if (url.startsWith('https://') || (url.startsWith('http://') && !url.startsWith(localOrigin))) {
                    var proxiedUrl = localOrigin + PROXY_PREFIX + url;
                    if (typeof input === 'string') {
                        return originalFetch.call(this, proxiedUrl, init);
                    } else if (input instanceof Request) {
                        var newReq = new Request(proxiedUrl, input);
                        return originalFetch.call(this, newReq, init);
                    }
                }
                return originalFetch.call(this, input, init);
            };

            // Wrap XMLHttpRequest
            var originalOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(method, url) {
                var args = Array.prototype.slice.call(arguments);
                if (typeof url === 'string' && (url.startsWith('https://') || (url.startsWith('http://') && !url.startsWith(localOrigin)))) {
                    args[1] = localOrigin + PROXY_PREFIX + url;
                }
                return originalOpen.apply(this, args);
            };
        })();
    </script>
    
    <script type="module" src="./index.js"></script>
    <script>
        // Error overlay - catch uncaught errors and display them in-preview
        window.onerror = function(msg, src, line, col, err) {
            showError(msg, err ? err.stack : src + ':' + line);
        };
        window.onunhandledrejection = function(e) {
            showError('Unhandled Promise Rejection', e.reason ? (e.reason.stack || String(e.reason)) : 'Unknown error');
        };
        function showError(title, detail) {
            var el = document.createElement('div');
            el.className = 'banana-error-overlay';
            el.innerHTML = '<h2>' + escHtml(String(title)) + '</h2><pre>' + escHtml(String(detail || '')) + '</pre><button onclick="this.parentElement.remove()">Dismiss</button>';
            document.body.appendChild(el);
        }
        function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>
